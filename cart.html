<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Giỏ hàng | Aurora Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER giống index.html (copy nguyên phần header) -->

<header class="header">
  <div class="container header__inner">
    <a class="logo" href="index.html">
      <span class="logo__mark">✦</span>
      <span class="logo__text">Aurora Store</span>
    </a>

    <div class="actions">
      <a class="iconBtn" href="cart.html">🛒 <span class="badge">0</span></a>
    </div>
  </div>
</header>

<main class="section">
  <div class="container">
    <h1>🛒 Giỏ hàng</h1>

    <div id="cartEmpty" class="muted" style="display:none;">
      Giỏ hàng trống. <a href="shop.html">Quay lại mua sắm</a>
    </div>

    <div id="cartList"></div>

    <div class="card" style="padding:16px; margin-top:20px;">
      <strong>Tổng tiền:</strong>
      <span id="cartTotal">0₫</span>
    </div>

    <div style="margin-top:16px; display:flex; gap:12px;">
      <a href="checkout.html" class="btn btn--dark">Thanh toán</a>
      <button class="btn btn--ghost" onclick="clearCart()">Xóa giỏ</button>
    </div>
  </div>
</main>

<script src="js/cart.js"></script>
<script src="js/cart-page.js"></script>
</body>
</html>
