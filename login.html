<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng nhập | Aurora Store</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', ui-sans-serif, sans-serif;
      background: #fdf6f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Decorative blobs */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,107,157,.18) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; right: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(179,102,255,.14) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .mini-header {
      padding: 18px 28px;
      display: flex; align-items: center; gap: 10px;
      position: relative; z-index: 1;
    }
    .logo-mark {
      width: 36px; height: 36px; display: grid; place-items: center;
      border-radius: 12px;
      background: linear-gradient(135deg, #ff6b9d, #c850f5);
      color: #fff; font-weight: 900; font-size: 18px;
      box-shadow: 0 4px 14px rgba(255,107,157,.35);
    }
    .logo-text {
      font-weight: 900; font-size: 18px;
      background: linear-gradient(135deg, #ff6b9d, #c850f5);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    .auth-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 20px 16px 60px;
      position: relative; z-index: 1;
    }

    .auth-card {
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(255,107,157,.15);
      border-radius: 28px;
      padding: 40px 36px;
      width: 100%; max-width: 420px;
      box-shadow: 0 24px 64px rgba(255,107,157,.12), 0 2px 8px rgba(0,0,0,.06);
      animation: slideUp .4s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-icon { font-size: 2.4rem; margin-bottom: 12px; }
    .auth-title { font-size: 26px; font-weight: 900; margin-bottom: 6px; color: #111; }
    .auth-subtitle { color: #888; font-size: 14px; margin-bottom: 28px; line-height: 1.5; }

    .auth-tabs {
      display: flex; gap: 6px; margin-bottom: 24px;
      background: #f4f4f8; padding: 4px; border-radius: 16px;
    }
    .tab-btn {
      flex: 1; padding: 10px 8px; border: none; background: transparent;
      border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 14px;
      color: #888; transition: all .22s; font-family: inherit;
    }
    .tab-btn.active {
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,.10);
      color: #ff6b9d;
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-weight: 700; font-size: 13px;
      margin-bottom: 7px; color: #444;
    }
    .field input {
      width: 100%; height: 48px; padding: 0 16px;
      border: 1.5px solid #eee; border-radius: 14px;
      font-size: 15px; font-weight: 500; outline: none;
      font-family: inherit; color: #111; background: #fafafa;
      transition: border-color .18s, box-shadow .18s, background .18s;
    }
    .field input:focus {
      border-color: rgba(255,107,157,.6);
      box-shadow: 0 0 0 3px rgba(255,107,157,.10);
      background: #fff;
    }
    .field input::placeholder { color: #ccc; font-weight: 400; }

    .forgot { text-align: right; margin-top: -8px; margin-bottom: 20px; }
    .forgot a {
      font-size: 13px; color: #c850f5; font-weight: 700; text-decoration: none;
    }
    .forgot a:hover { text-decoration: underline; }

    .btn-primary {
      width: 100%; height: 50px;
      background: linear-gradient(135deg, #ff6b9d 0%, #c850f5 100%);
      color: #fff; border: none; border-radius: 14px;
      font-weight: 900; font-size: 15px; cursor: pointer; font-family: inherit;
      box-shadow: 0 8px 24px rgba(255,107,157,.30);
      transition: filter .15s, transform .15s;
    }
    .btn-primary:hover  { filter: brightness(1.06); transform: translateY(-1px); }
    .btn-primary:active { filter: brightness(.94); transform: translateY(0); }
    .btn-primary:disabled { opacity: .55; cursor: default; transform: none; }

    .alert {
      padding: 12px 16px; border-radius: 12px; font-size: 13px;
      font-weight: 700; margin-bottom: 18px; display: none;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .alert.show { display: block; }
    .alert-error   { background: #fff1f3; color: #e11d48; border: 1.5px solid #fecdd3; }
    .alert-success { background: #f0fdf4; color: #15803d; border: 1.5px solid #bbf7d0; }

    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    .auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: #888; }
    .auth-footer a { color: #ff6b9d; font-weight: 800; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    .spinner {
      display: inline-block; width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,.35); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 10px 0 20px; color: #ccc; font-size: 12px; font-weight: 600;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #eee;
    }
  </style>
</head>
<body>

  <div class="mini-header">
    <div class="logo-mark">✦</div>
    <a class="logo-text" href="index.html">Aurora Store</a>
  </div>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-icon">👋</div>
      <h1 class="auth-title">Chào mừng trở lại!</h1>
      <p class="auth-subtitle">Đăng nhập để mua sắm và theo dõi đơn hàng của bạn.</p>

      <div class="auth-tabs">
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Đăng nhập</button>
        <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Đăng ký</button>
      </div>

      <div class="alert" id="alertBox"></div>

      <!-- Login Panel -->
      <div class="auth-panel active" id="panelLogin">
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label>Mật khẩu</label>
          <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div class="forgot">
          <a href="#" onclick="handleForgot(event)">Quên mật khẩu?</a>
        </div>
        <button class="btn-primary" id="btnLogin" onclick="handleLogin()">Đăng nhập</button>
      </div>

      <!-- Register Panel -->
      <div class="auth-panel" id="panelRegister">
        <div class="field">
          <label>Họ và tên</label>
          <input type="text" id="regName" placeholder="Nguyễn Văn A">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label>Mật khẩu <span style="color:#ccc;font-weight:500">(tối thiểu 6 ký tự)</span></label>
          <input type="password" id="regPass" placeholder="••••••••" autocomplete="new-password">
        </div>
        <button class="btn-primary" id="btnRegister" onclick="handleRegister()">Tạo tài khoản</button>
      </div>

      <p class="auth-footer">
        Quay lại <a href="index.html">trang chủ →</a>
      </p>
    </div>
  </div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC51aDs65qXDcJxkpuc2z4FgdRQ_L7YZho",
    authDomain: "aurorashop1-1246d.firebaseapp.com",
    projectId: "aurorashop1-1246d",
    storageBucket: "aurorashop1-1246d.firebasestorage.app",
    messagingSenderId: "220058602608",
    appId: "1:220058602608:web:7bc5f71ef2610a70a6f8b5"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  // Cờ để tránh xung đột giữa listener tự động và quá trình xử lý thủ công
  let _isProcessing = false;

  /**
   * Xử lý sau khi xác thực thành công: Lưu dữ liệu local và chuyển hướng người dùng
   */
  async function finalizeAuth(user) {
    try {
      // Lấy thông tin role từ Firestore
      const snap = await db.collection('users').doc(user.uid).get();
      const userData = snap.data();
      const role = userData?.role || 'customer';

      // Đồng bộ giỏ hàng từ Firestore về LocalStorage
      const cartSnap = await db.collection('carts').doc(user.uid).get();
      if (cartSnap.exists) {
        localStorage.setItem('aurora_store_cart', JSON.stringify(cartSnap.data().items || []));
      }

      // Lưu thông tin phiên đăng nhập
      localStorage.setItem('aurora_user', JSON.stringify({
        uid: user.uid,
        displayName: user.displayName || userData?.displayName || '',
        email: user.email,
        role: role
      }));

      // Điều hướng dựa trên quyền hạn
      const returnUrl = new URLSearchParams(location.search).get('returnUrl');
      if (role === 'admin') {
        window.location.href = returnUrl || 'admin-dashboard.html';
      } else {
        window.location.href = returnUrl || 'index.html';
      }
    } catch (err) {
      console.error('Lỗi khi hoàn tất xác thực:', err);
      window.location.href = 'index.html'; // Fallback về trang chủ nếu có lỗi
    }
  }

  // Tự động nhận diện trạng thái đăng nhập (ví dụ: khi load trang hoặc sau khi Login)
  auth.onAuthStateChanged(user => {
    if (user && !_isProcessing) {
      finalizeAuth(user);
    }
  });

  /* ── Tab switching ── */
  function switchTab(tab) {
    document.getElementById('panelLogin').classList.toggle('active', tab === 'login');
    document.getElementById('panelRegister').classList.toggle('active', tab === 'register');
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    hideAlert();
  }

  /* ── Alert helpers ── */
  function showAlert(msg, type = 'error') {
    const el = document.getElementById('alertBox');
    el.textContent = msg;
    el.className = `alert alert-${type} show`;
  }
  function hideAlert() {
    document.getElementById('alertBox').classList.remove('show');
  }

  /* ── Loading state ── */
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.disabled = loading;
    const labels = { btnLogin: 'Đăng nhập', btnRegister: 'Tạo tài khoản' };
    btn.innerHTML = loading
      ? `<span class="spinner"></span> Đang xử lý...`
      : labels[btnId];
  }

  /* ── Login ── */
  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;
    if (!email || !pass) { showAlert('Vui lòng nhập email và mật khẩu.'); return; }
    setLoading('btnLogin', true);
    hideAlert();
    _isProcessing = true; // Chặn listener tự động để xử lý tập trung
    try {
      const cred = await auth.signInWithEmailAndPassword(email, pass);
      finalizeAuth(cred.user);
    } catch (err) {
      _isProcessing = false;
      setLoading('btnLogin', false);
      showAlert(_firebaseErrMsg(err.code));
    }
  }

  /* ── Register ── */
  async function handleRegister() {
    const name  = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPass').value;
    if (!name)        { showAlert('Vui lòng nhập họ tên.'); return; }
    if (!email)       { showAlert('Vui lòng nhập email.'); return; }
    if (pass.length < 6) { showAlert('Mật khẩu tối thiểu 6 ký tự.'); return; }

    setLoading('btnRegister', true);
    hideAlert();
    _isProcessing = true; // Chặn listener redirect tự động để hoàn tất đăng ký Firestore

    try {
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({ displayName: name });

      // Đảm bảo document user đã được tạo trong Firestore
      await db.collection('users').doc(cred.user.uid).set({
        displayName: name,
        email,
        role: 'customer',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      showAlert('🎉 Đăng ký thành công! Đang chuẩn bị...', 'success');
      _isProcessing = false; // Mở lại cờ và gọi finalize
      finalizeAuth(cred.user);
    } catch (err) {
      _isProcessing = false;
      setLoading('btnRegister', false);
      showAlert(_firebaseErrMsg(err.code));
    }
  }

  /* ── Forgot password ── */
  async function handleForgot(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    if (!email) { showAlert('Nhập email vào ô trên trước, rồi nhấn "Quên mật khẩu?".'); return; }
    try {
      await auth.sendPasswordResetEmail(email);
      showAlert(`📧 Email đặt lại mật khẩu đã gửi đến ${email}`, 'success');
    } catch (err) { showAlert(_firebaseErrMsg(err.code)); }
  }

  /* ── Firebase error messages ── */
  function _firebaseErrMsg(code) {
    const map = {
      'auth/user-not-found':         'Không tìm thấy tài khoản với email này.',
      'auth/wrong-password':         'Mật khẩu không đúng.',
      'auth/invalid-email':          'Email không hợp lệ.',
      'auth/email-already-in-use':   'Email này đã được sử dụng.',
      'auth/weak-password':          'Mật khẩu quá yếu (tối thiểu 6 ký tự).',
      'auth/invalid-credential':     'Email hoặc mật khẩu không đúng.',
      'auth/too-many-requests':      'Quá nhiều lần thử. Vui lòng thử lại sau.',
      'auth/network-request-failed': 'Lỗi kết nối mạng. Kiểm tra internet.',
      'auth/popup-blocked':          'Popup bị chặn. Vui lòng cho phép popup.',
      'auth/unauthorized-domain':    `Tên miền "${window.location.hostname}" chưa được cấp quyền trong Firebase Console.`,
    };
    return map[code] || `Đã xảy ra lỗi (${code}).`;
  }

  /* ── Enter key support ── */
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('panelLogin').classList.contains('active')) handleLogin();
    else handleRegister();
  });
</script>
</body>
</html>
