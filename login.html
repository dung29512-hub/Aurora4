<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tài khoản | Aurora Store</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* CSS bổ sung riêng cho trang Login */
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70vh;
      padding: 40px 20px;
      background-color: #f9f9f9;
    }
    .auth-card {
      background: #fff;
      width: 100%;
      max-width: 400px;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .auth-tabs {
      display: flex;
      margin-bottom: 30px;
      border-bottom: 2px solid #eee;
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      cursor: pointer;
      font-weight: 600;
      color: #999;
      transition: 0.3s;
    }
    .auth-tab.active {
      color: #000;
      border-bottom: 2px solid #000; /* Hoặc màu chủ đạo của shop bạn */
    }
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.3s;
    }
    .form-group input:focus {
      border-color: #000;
    }
    .auth-btn {
      width: 100%;
      padding: 14px;
      font-weight: 600;
      margin-top: 10px;
    }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }
    .auth-footer a {
      color: #000;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="container header__inner" style="justify-content: center;">
      <a class="logo" href="index.html">
        <span class="logo__mark">✦</span>
        <span class="logo__text">Aurora Store</span>
      </a>
    </div>
  </header>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-tabs">
        <div id="tab-login" class="auth-tab active" onclick="switchTab('login')">Đăng nhập</div>
        <div id="tab-register" class="auth-tab" onclick="switchTab('register')">Đăng ký</div>
      </div>

      <form id="form-login" class="auth-form active">
        <div class="form-group">
          <label for="login-email">Email / Số điện thoại</label>
          <input type="text" id="login-email" placeholder="Nhập email của bạn" required>
        </div>
        <div class="form-group">
          <label for="login-password">Mật khẩu</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn--dark auth-btn">ĐĂNG NHẬP</button>
        <div class="auth-footer">
          <a href="#">Quên mật khẩu?</a>
        </div>
      </form>

      <form id="form-register" class="auth-form">
        <div class="form-group">
          <label for="reg-name">Họ và tên</label>
          <input type="text" id="reg-name" placeholder="Ví dụ: Nguyễn Văn A" required>
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="example@gmail.com" required>
        </div>
        <div class="form-group">
          <label for="reg-password">Mật khẩu</label>
          <input type="password" id="reg-password" placeholder="Tối thiểu 6 ký tự" required>
        </div>
        <button type="submit" class="btn btn--primary auth-btn" style="background: #ffb6c1; border:none;">ĐĂNG KÝ TÀI KHOẢN</button>
      </form>
    </div>
  </main>

  <script>
    function switchTab(type) {
      const loginForm = document.getElementById('form-login');
      const registerForm = document.getElementById('form-register');
      const loginTab = document.getElementById('tab-login');
      const registerTab = document.getElementById('tab-register');

      if (type === 'login') {
        loginForm.classList.add('active');
        registerForm.classList.remove('active');
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
      } else {
        loginForm.classList.remove('active');
        registerForm.classList.add('active');
        loginTab.classList.remove('active');
        registerTab.classList.add('active');
      }
    }

    // Xử lý submit (Demo)
    document.getElementById('form-login').onsubmit = (e) => {
      e.preventDefault();
      alert('Đăng nhập thành công!');
      window.location.href = 'index.html';
    };

    document.getElementById('form-register').onsubmit = (e) => {
      e.preventDefault();
      alert('Đăng ký thành công! Vui lòng đăng nhập.');
      switchTab('login');
    };
  </script>

</body>
</html>
