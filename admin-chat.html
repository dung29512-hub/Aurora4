
<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Chat | Aurora Store</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #ff6b9d;
      --peach: #ffb6c1;
      --grad: linear-gradient(135deg, #ff6b9d, #ffb347);
      --dark: #1a1a2e;
      --sidebar-w: 300px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f4f4f8;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── LOGIN SCREEN ── */
    .login-screen {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .login-screen.hidden { display: none; }
    .login-card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      padding: 40px 36px;
      width: 360px;
      backdrop-filter: blur(12px);
    }
    .login-logo {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 6px;
    }
    .login-title {
      text-align: center;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .login-sub {
      text-align: center;
      color: rgba(255,255,255,.5);
      font-size: 0.82rem;
      margin-bottom: 28px;
    }
    .login-field { margin-bottom: 14px; }
    .login-field input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 12px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
      transition: border-color .15s;
    }
    .login-field input::placeholder { color: rgba(255,255,255,.35); }
    .login-field input:focus { border-color: var(--pink); }
    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--grad);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 6px;
      font-family: inherit;
    }
    .login-err {
      color: #ff6b6b;
      font-size: 0.82rem;
      text-align: center;
      margin-top: 12px;
      min-height: 18px;
    }

    /* ── LAYOUT ── */
    .sidebar {
      width: var(--sidebar-w);
      background: #fff;
      border-right: 1px solid #eee;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      height: 100vh;
    }
    .sidebar__head {
      padding: 18px 20px 14px;
      border-bottom: 1px solid #f0f0f0;
      background: var(--dark);
    }
    .sidebar__brand {
      font-weight: 900;
      font-size: 1rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .sidebar__sub {
      font-size: 0.75rem;
      color: rgba(255,255,255,.5);
    }
    .sidebar__logout {
      margin-left: auto;
      background: rgba(255,255,255,.1);
      border: none;
      color: rgba(255,255,255,.7);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .sidebar__logout:hover { background: rgba(255,255,255,.2); color: #fff; }

    .sidebar__search {
      padding: 12px 14px;
      border-bottom: 1px solid #f5f5f5;
    }
    .sidebar__search input {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid #eee;
      border-radius: 20px;
      font-size: 0.82rem;
      outline: none;
      font-family: inherit;
    }
    .sidebar__search input:focus { border-color: var(--peach); }

    .session-list {
      flex: 1;
      overflow-y: auto;
    }
    .session-list::-webkit-scrollbar { width: 3px; }
    .session-list::-webkit-scrollbar-thumb { background: #eee; }

    .session-item {
      padding: 14px 16px;
      border-bottom: 1px solid #f8f8f8;
      cursor: pointer;
      transition: background .1s;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .session-item:hover { background: #fafafa; }
    .session-item.active { background: #fff4f7; border-right: 3px solid var(--pink); }
    .session-item__avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--grad);
      color: #fff;
      font-weight: 900;
      font-size: 1rem;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .session-item__body { flex: 1; min-width: 0; }
    .session-item__name {
      font-weight: 700;
      font-size: 0.88rem;
      margin-bottom: 3px;
    }
    .session-item__preview {
      font-size: 0.78rem;
      color: #999;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .session-item__meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }
    .session-item__time { font-size: 0.7rem; color: #bbb; }
    .unread-badge {
      background: var(--pink);
      color: #fff;
      border-radius: 10px;
      padding: 2px 7px;
      font-size: 0.68rem;
      font-weight: 900;
      display: none;
    }
    .unread-badge.show { display: block; }

    .empty-sessions {
      padding: 40px 20px;
      text-align: center;
      color: #ccc;
      font-size: 0.88rem;
    }

    /* ── CHAT PANEL ── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat-panel__placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ccc;
    }
    .chat-panel__placeholder .big { font-size: 3rem; margin-bottom: 12px; }
    .chat-panel__placeholder p { font-size: 0.9rem; }

    .chat-panel__head {
      padding: 16px 22px;
      border-bottom: 1px solid #eee;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .chat-panel__avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--grad);
      color: #fff;
      font-weight: 900;
      display: grid; place-items: center;
      font-size: 1rem;
    }
    .chat-panel__name { font-weight: 800; font-size: 0.95rem; }
    .chat-panel__status { font-size: 0.75rem; color: #22c55e; }

    .chat-panel__msgs {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f9f9fb;
    }
    .chat-panel__msgs::-webkit-scrollbar { width: 4px; }
    .chat-panel__msgs::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    /* Message bubbles */
    .amsg {
      display: flex;
      flex-direction: column;
      max-width: 72%;
      gap: 3px;
      animation: msgIn .18s ease;
    }
    @keyframes msgIn { from { opacity:0; transform:translateY(5px); } }
    .amsg--visitor { align-self: flex-start; align-items: flex-start; }
    .amsg--admin   { align-self: flex-end;   align-items: flex-end; }

    .amsg__bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.88rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .amsg--visitor .amsg__bubble {
      background: #fff;
      color: #222;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .amsg--admin .amsg__bubble {
      background: var(--grad);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .amsg__meta { font-size: 0.7rem; color: #bbb; }

    /* Date separator */
    .date-sep {
      text-align: center;
      font-size: 0.72rem;
      color: #ccc;
      margin: 6px 0;
    }

    /* Input area */
    .chat-panel__input {
      padding: 14px 20px;
      border-top: 1px solid #eee;
      background: #fff;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-panel__textarea {
      flex: 1;
      border: 1.5px solid #eee;
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 0.88rem;
      resize: none;
      outline: none;
      font-family: inherit;
      max-height: 100px;
      transition: border-color .15s;
      line-height: 1.5;
    }
    .chat-panel__textarea:focus { border-color: var(--pink); }
    .chat-panel__send {
      height: 42px;
      padding: 0 18px;
      background: var(--grad);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: 800;
      font-size: 0.85rem;
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
      transition: opacity .15s;
    }
    .chat-panel__send:disabled { opacity: .5; cursor: default; }

    /* Quick replies */
    .quick-replies {
      padding: 8px 20px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      background: #fff;
    }
    .qr-btn {
      padding: 5px 12px;
      border: 1.5px solid #eee;
      border-radius: 20px;
      font-size: 0.75rem;
      background: #fff;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-family: inherit;
      color: #555;
    }
    .qr-btn:hover { border-color: var(--pink); background: #fff4f7; color: var(--pink); }

    /* Status tag */
    .status-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-left: 8px;
    }
    .status-tag--open   { background: #dcfce7; color: #16a34a; }
    .status-tag--closed { background: #f1f5f9; color: #94a3b8; }

    /* Notification toast */
    .toast {
      position: fixed;
      top: 20px; right: 20px;
      background: #1a1a2e;
      color: #fff;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 6px 24px rgba(0,0,0,.2);
      z-index: 9999;
      opacity: 0;
      transform: translateY(-10px);
      transition: all .3s;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* Online indicator */
    .online-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    .admin-nav {
      display: flex; gap: 5px; padding: 10px 14px;
      background: #fdfdfd; border-bottom: 1px solid #eee;
    }
    .admin-nav a {
      text-decoration: none; font-size: 0.8rem; font-weight: 700;
      padding: 6px 12px; border-radius: 6px; color: #666;
    }
    .admin-nav a.active { background: var(--pink); color: #fff; }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">✦</div>
    <div class="login-title">Aurora Admin Chat</div>
    <div class="login-sub">Đăng nhập để trả lời tư vấn khách hàng</div>
    <div class="login-field">
      <input type="email" id="adminEmail" placeholder="Email admin..." autocomplete="email">
    </div>
    <div class="login-field">
      <input type="password" id="adminPass" placeholder="Mật khẩu..."
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Đăng nhập</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ── MAIN LAYOUT ── -->
<div class="sidebar">
  <div class="sidebar__head">
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="sidebar__brand">✦ Admin Chat</div>
      <button class="sidebar__logout" onclick="doLogout()">Đăng xuất</button>
    </div>
    <div class="sidebar__sub" id="adminEmailLabel"></div>
  </div>

  <div class="admin-nav">
    <a href="admin-dashboard.html">🏠 Dashboard</a>
    <a href="admin-chat.html" class="active">💬 Tin nhắn</a>
    <a href="admin-orders.html">Đơn hàng</a>
  </div>

  <div class="sidebar__search">
    <input type="text" id="searchInput" placeholder="🔍 Tìm khách hàng..." oninput="filterSessions()">
  </div>

  <div class="session-list" id="sessionList">
    <div class="empty-sessions">Chưa có hội thoại nào</div>
  </div>
</div>

<div class="chat-panel" id="chatPanel">
  <div class="chat-panel__placeholder" id="chatPlaceholder">
    <div class="big">💬</div>
    <p>Chọn hội thoại để bắt đầu trả lời</p>
  </div>

  <div id="chatView" style="display:none; flex:1; flex-direction:column; overflow:hidden; display:none;">
    <!-- Head -->
    <div class="chat-panel__head">
      <div class="chat-panel__avatar" id="cpAvatar">?</div>
      <div>
        <div class="chat-panel__name" id="cpName">—</div>
        <div class="chat-panel__status">
          <span class="online-dot"></span>Đang hoạt động
          <span class="status-tag status-tag--open" id="cpStatus">Mở</span>
        </div>
      </div>
      <div style="margin-left:auto; display:flex; gap:8px;">
        <button onclick="closeSession()" style="background:#f1f5f9; border:none; border-radius:8px; padding:6px 12px; font-size:0.78rem; cursor:pointer; font-family:inherit; color:#64748b;">
          ✓ Đánh dấu đã xong
        </button>
      </div>
    </div>

    <!-- Quick replies -->
    <div class="quick-replies">
      <span style="font-size:0.72rem; color:#bbb; align-self:center;">Gợi ý:</span>
      <button class="qr-btn" onclick="useQuickReply(this)">Dạ bạn cần tư vấn gì ạ? 😊</button>
      <button class="qr-btn" onclick="useQuickReply(this)">Sản phẩm còn hàng ạ!</button>
      <button class="qr-btn" onclick="useQuickReply(this)">Bạn cho mình địa chỉ nhận hàng nhé</button>
      <button class="qr-btn" onclick="useQuickReply(this)">Mình sẽ liên hệ lại sớm nhé 💕</button>
      <button class="qr-btn" onclick="useQuickReply(this)">Cảm ơn bạn đã mua hàng! 🎀</button>
    </div>

    <!-- Messages -->
    <div class="chat-panel__msgs" id="cpMsgs"></div>

    <!-- Input -->
    <div class="chat-panel__input">
      <textarea class="chat-panel__textarea" id="cpInput" rows="1"
                placeholder="Nhập phản hồi..."
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();adminSend();}"
                oninput="autoResize(this)"></textarea>
      <button class="chat-panel__send" id="cpSendBtn" onclick="adminSend()">Gửi ↑</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ── FIREBASE LOGIC ── -->
<script>
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyC51aDs65qXDcJxkpuc2z4FgdRQ_L7YZho",
    authDomain: "aurorashop1-1246d.firebaseapp.com",
    projectId: "aurorashop1-1246d",
    storageBucket: "aurorashop1-1246d.firebasestorage.app",
    messagingSenderId: "220058602608",
    appId: "1:220058602608:web:7bc5f71ef2610a70a6f8b5"
  };

  let app;
  try { app = firebase.app(); } catch(e) { app = firebase.initializeApp(FIREBASE_CONFIG); }
  const auth = firebase.auth();
  const db   = firebase.firestore();

  let currentAdmin = null;
  let currentSession = null;
  let allSessions = [];
  let unsubMsgs = null;
  let unsubSessions = null;

  /* ── AUTH ── */
  auth.onAuthStateChanged(async user => {
    if (!user) {
      document.getElementById('loginScreen').classList.remove('hidden');
      return;
    }

    // Kiểm tra role admin
    const doc = await db.collection('users').doc(user.uid).get();
    const role = doc.data()?.role;
    if (role !== 'admin') {
      auth.signOut();
      document.getElementById('loginErr').textContent = 'Tài khoản không có quyền admin.';
      return;
    }

    currentAdmin = user;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('adminEmailLabel').textContent = user.email;
    loadSessions();
  });

  function doLogin() {
    const email = document.getElementById('adminEmail').value.trim();
    const pass  = document.getElementById('adminPass').value;
    document.getElementById('loginErr').textContent = '';
    if (!email || !pass) { document.getElementById('loginErr').textContent = 'Vui lòng nhập đủ thông tin.'; return; }
    auth.signInWithEmailAndPassword(email, pass)
      .catch(err => {
        document.getElementById('loginErr').textContent = 'Email hoặc mật khẩu không đúng.';
      });
  }

  function doLogout() {
    auth.signOut();
    currentSession = null;
    document.getElementById('loginScreen').classList.remove('hidden');
  }

  /* ── SESSIONS ── */
  function loadSessions() {
    if (unsubSessions) unsubSessions();
    unsubSessions = db.collection('chat_sessions')
      .orderBy('lastMsgAt', 'desc')
      .onSnapshot(snap => {
        allSessions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderSessionList(allSessions);

        // Notification cho tin nhắn mới
        snap.docChanges().forEach(change => {
          if (change.type === 'modified') {
            const s = { id: change.doc.id, ...change.doc.data() };
            if (s.unreadAdmin > 0 && s.id !== currentSession?.id) {
              showToast(`💬 Tin nhắn mới từ ${s.visitorName}`);
            }
          }
        });
      });
  }

  function renderSessionList(sessions) {
    const list = document.getElementById('sessionList');
    if (sessions.length === 0) {
      list.innerHTML = '<div class="empty-sessions">Chưa có hội thoại nào</div>';
      return;
    }
    list.innerHTML = sessions.map(s => {
      const initial = (s.visitorName || '?')[0].toUpperCase();
      const time = s.lastMsgAt?.toDate
        ? s.lastMsgAt.toDate().toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'})
        : '';
      const isActive = currentSession?.id === s.id;
      const unread = s.unreadAdmin || 0;
      return `
        <div class="session-item ${isActive ? 'active' : ''}" onclick="selectSession('${s.id}')">
          <div class="session-item__avatar">${initial}</div>
          <div class="session-item__body">
            <div class="session-item__name">${escHtml(s.visitorName || 'Khách')}</div>
            <div class="session-item__preview">${escHtml(s.lastMsg || 'Bắt đầu hội thoại...')}</div>
          </div>
          <div class="session-item__meta">
            <span class="session-item__time">${time}</span>
            <span class="unread-badge ${unread > 0 ? 'show' : ''}">${unread}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterSessions() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allSessions.filter(s =>
      (s.visitorName || '').toLowerCase().includes(q) ||
      (s.lastMsg || '').toLowerCase().includes(q)
    );
    renderSessionList(filtered);
  }

  /* ── SELECT SESSION ── */
  window.selectSession = function(id) {
    currentSession = allSessions.find(s => s.id === id);
    if (!currentSession) return;

    // Reset unread
    db.collection('chat_sessions').doc(id).update({ unreadAdmin: 0 });

    // Update UI
    const initial = (currentSession.visitorName || '?')[0].toUpperCase();
    document.getElementById('cpAvatar').textContent = initial;
    document.getElementById('cpName').textContent   = currentSession.visitorName || 'Khách';
    document.getElementById('cpStatus').textContent = currentSession.status === 'closed' ? 'Đã đóng' : 'Mở';
    document.getElementById('cpStatus').className   = `status-tag status-tag--${currentSession.status === 'closed' ? 'closed' : 'open'}`;

    document.getElementById('chatPlaceholder').style.display = 'none';
    document.getElementById('chatView').style.display = 'flex';
    document.getElementById('chatView').style.flexDirection = 'column';
    document.getElementById('chatView').style.overflow = 'hidden';

    // Highlight active session
    renderSessionList(allSessions);

    loadSessionMsgs(id);
    document.getElementById('cpInput').focus();
  };

  /* ── LOAD MESSAGES ── */
  function loadSessionMsgs(sessionId) {
    if (unsubMsgs) unsubMsgs();
    unsubMsgs = db.collection('chat_sessions').doc(sessionId)
      .collection('messages')
      .orderBy('ts', 'asc')
      .onSnapshot(snap => {
        const el = document.getElementById('cpMsgs');
        el.innerHTML = '';
        let lastDate = '';

        snap.forEach(doc => {
          const m = doc.data();
          const isAdmin   = m.sender === 'admin';
          const dateStr   = m.ts?.toDate ? m.ts.toDate().toLocaleDateString('vi-VN') : '';
          const timeStr   = m.ts?.toDate ? m.ts.toDate().toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'}) : '';

          if (dateStr && dateStr !== lastDate) {
            lastDate = dateStr;
            const sep = document.createElement('div');
            sep.className = 'date-sep';
            sep.textContent = dateStr;
            el.appendChild(sep);
          }

          const div = document.createElement('div');
          div.className = `amsg amsg--${isAdmin ? 'admin' : 'visitor'}`;
          div.innerHTML = `
            <div class="amsg__bubble">${escHtml(m.text)}</div>
            <div class="amsg__meta">
              ${isAdmin ? 'Bạn' : escHtml(m.senderName || 'Khách')} • ${timeStr}
            </div>
          `;
          el.appendChild(div);
        });

        el.scrollTop = el.scrollHeight;
      });
  }

  /* ── ADMIN SEND ── */
  window.adminSend = async function() {
    const input = document.getElementById('cpInput');
    const text = input.value.trim();
    if (!text || !currentSession) return;

    const btn = document.getElementById('cpSendBtn');
    btn.disabled = true;
    input.value = '';
    autoResize(input);

    try {
      await db.collection('chat_sessions').doc(currentSession.id)
              .collection('messages').add({
        text,
        sender: 'admin',
        senderName: 'Aurora Store',
        ts: firebase.firestore.FieldValue.serverTimestamp(),
        read: false
      });

      await db.collection('chat_sessions').doc(currentSession.id).update({
        lastMsg: text,
        lastMsgAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch(err) {
      console.error(err);
      showToast('Gửi thất bại, thử lại!');
    }
    btn.disabled = false;
    input.focus();
  };

  /* ── CLOSE SESSION ── */
  window.closeSession = function() {
    if (!currentSession) return;
    db.collection('chat_sessions').doc(currentSession.id).update({ status: 'closed' });
    showToast('✓ Đã đánh dấu xong');
  };

  /* ── QUICK REPLIES ── */
  window.useQuickReply = function(btn) {
    document.getElementById('cpInput').value = btn.textContent.trim();
    document.getElementById('cpInput').focus();
  };

  /* ── HELPERS ── */
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
